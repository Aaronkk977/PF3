name: Release desktop app

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: electron-builder-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone bundle
        run: npm run build:app

      - name: Install isolated Prisma CLI bundle
        run: npm run prisma-cli-bundle:install

      - name: Build and publish Electron installer
        run: npx electron-builder --win -c electron-builder.config.cjs --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
