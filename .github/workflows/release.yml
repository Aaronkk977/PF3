name: Release desktop app

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable Windows Defender realtime scanning
        shell: pwsh
        run: |
          try { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction Stop; Write-Host "Realtime monitoring disabled" } catch { Write-Host "Could not disable realtime monitoring: $_" }
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron-builder\Cache"
          Add-MpPreference -ExclusionPath "$env:TEMP"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.npm"
          Add-MpPreference -ExclusionProcess "electron-builder.exe"
          Add-MpPreference -ExclusionProcess "makensis.exe"
          Add-MpPreference -ExclusionProcess "7za.exe"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: electron-builder-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone bundle
        run: npm run build:app

      - name: Build and publish Electron installer
        shell: pwsh
        # 用 heartbeat 包住 electron-builder：每 60 秒印出打包子進程與其 CPU 時間，
        # 讓 log 能分辨「還在壓縮（CPU 持續增加）」和「真的掛住（CPU 凍結）」。
        run: |
          $p = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "npx", "electron-builder", "--win", "-c", "electron-builder.config.cjs", "--publish", "always" `
            -NoNewWindow -PassThru
          $null = $p.Handle  # 先快取 handle，否則結束後讀不到 ExitCode
          while (-not $p.HasExited) {
            Start-Sleep -Seconds 60
            $procs = Get-Process -Name "7za", "makensis", "signtool", "app-builder" -ErrorAction SilentlyContinue
            if ($procs) {
              $line = ($procs | ForEach-Object { "{0}(pid {1}) cpu={2:N0}s" -f $_.ProcessName, $_.Id, $_.TotalProcessorTime.TotalSeconds }) -join "; "
            } else {
              $line = "no packer child processes"
            }
            Write-Host ("[heartbeat {0:HH:mm:ss}] {1}" -f (Get-Date), $line)
          }
          exit $p.ExitCode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: "electron-builder"
          # NSIS 差異更新模式的壓縮是單執行緒 LZMA，runner 單核跑 mx=9 要 40 分鐘以上
          # （多次撞上 timeout）。降到 mx=4 實測快 6.5 倍，安裝檔僅大 13%（~250MB）。
          ELECTRON_BUILDER_COMPRESSION_LEVEL: "4"

      - name: Merge duplicate release drafts (electron-builder publish race)
        # electron-builder 併發上傳多個檔案（exe / blockmap / latest.yml）到
        # GitHub 時，偶爾會各自誤判「這個 tag 還沒有 release」而各建一個，
        # 導致同一個 tag 底下出現兩個草稿、檔案被拆開（實測 v0.1.7 發生過一次）。
        # 這一步把同 tag 底下所有 release 的資產合併進一個，其餘刪除，最後確保發布。
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          repo="${{ github.repository }}"
          tag="${{ github.ref_name }}"

          ids=$(gh api "repos/$repo/releases" --paginate --jq ".[] | select(.tag_name==\"$tag\") | .id")
          count=$(echo "$ids" | grep -c . || true)
          echo "Found $count release(s) for tag $tag"

          canonical=$(gh api "repos/$repo/releases" --paginate --jq ".[] | select(.tag_name==\"$tag\" and .draft==false) | .id" | head -n1)
          if [ -z "$canonical" ]; then
            canonical=$(echo "$ids" | head -n1)
          fi
          echo "Canonical release id: $canonical"

          if [ "$count" -gt 1 ]; then
            existing_names=$(gh api "repos/$repo/releases/$canonical/assets" --jq '.[].name')
            tmpdir=$(mktemp -d)
            for id in $ids; do
              if [ "$id" = "$canonical" ]; then continue; fi
              echo "Merging assets from duplicate release $id into $canonical"
              gh api "repos/$repo/releases/$id/assets" --jq '.[] | [(.id|tostring), .name] | @tsv' | while IFS=$'\t' read -r assetId assetName; do
                [ -z "$assetId" ] && continue
                if echo "$existing_names" | grep -qxF "$assetName"; then
                  echo "  skip $assetName (already present on canonical)"
                  continue
                fi
                echo "  moving $assetName"
                gh api "repos/$repo/releases/assets/$assetId" -H "Accept: application/octet-stream" > "$tmpdir/$assetName"
                gh api --method POST -H "Content-Type: application/octet-stream" \
                  "repos/$repo/releases/$canonical/assets?name=$assetName" \
                  --input "$tmpdir/$assetName" > /dev/null
              done
              echo "Deleting duplicate release $id"
              gh api --method DELETE "repos/$repo/releases/$id"
            done
            rm -rf "$tmpdir"
          fi

          gh api --method PATCH "repos/$repo/releases/$canonical" -f draft=false > /dev/null
          echo "Release $tag is published (release id $canonical)"
