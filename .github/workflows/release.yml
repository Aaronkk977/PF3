name: Release desktop app

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable Windows Defender realtime scanning
        shell: pwsh
        run: |
          try { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction Stop; Write-Host "Realtime monitoring disabled" } catch { Write-Host "Could not disable realtime monitoring: $_" }
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron-builder\Cache"
          Add-MpPreference -ExclusionPath "$env:TEMP"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.npm"
          Add-MpPreference -ExclusionProcess "electron-builder.exe"
          Add-MpPreference -ExclusionProcess "makensis.exe"
          Add-MpPreference -ExclusionProcess "7za.exe"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: electron-builder-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone bundle
        run: npm run build:app

      - name: Build and publish Electron installer
        shell: pwsh
        # 用 heartbeat 包住 electron-builder：每 60 秒印出打包子進程與其 CPU 時間，
        # 讓 log 能分辨「還在壓縮（CPU 持續增加）」和「真的掛住（CPU 凍結）」。
        run: |
          $p = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "npx", "electron-builder", "--win", "-c", "electron-builder.config.cjs", "--publish", "always" `
            -NoNewWindow -PassThru
          $null = $p.Handle  # 先快取 handle，否則結束後讀不到 ExitCode
          while (-not $p.HasExited) {
            Start-Sleep -Seconds 60
            $procs = Get-Process -Name "7za", "makensis", "signtool", "app-builder" -ErrorAction SilentlyContinue
            if ($procs) {
              $line = ($procs | ForEach-Object { "{0}(pid {1}) cpu={2:N0}s" -f $_.ProcessName, $_.Id, $_.TotalProcessorTime.TotalSeconds }) -join "; "
            } else {
              $line = "no packer child processes"
            }
            Write-Host ("[heartbeat {0:HH:mm:ss}] {1}" -f (Get-Date), $line)
          }
          exit $p.ExitCode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: "electron-builder"
          # NSIS 差異更新模式的壓縮是單執行緒 LZMA，runner 單核跑 mx=9 要 40 分鐘以上
          # （多次撞上 timeout）。降到 mx=4 實測快 6.5 倍，安裝檔僅大 13%（~250MB）。
          ELECTRON_BUILDER_COMPRESSION_LEVEL: "4"
